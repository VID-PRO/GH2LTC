; PlatformIO project: GH5 HDMI Timecode -> LTC generator
; Target: ESP32-C3 Super Mini, Arduino framework

[platformio]
default_envs = dual

[env:dual]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.partitions = no_ota.csv
build_flags =
    -Os
    -include src/config_dual.h
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1
src_filter = +<*>
lib_deps =
    Wire
    u8g2
    md_max72xx

; Web UI uses WiFi + WebServer (built-in with ESP32 Arduino) — no extra libs needed.
; Only u8g2 (OLED) and Wire are from lib_deps above.

; Build flags to override defaults (see src/config.h):
;   build_flags = -D LTC_DROP_FRAME=1
;   build_flags = -D WEBUI_AP_SSID=\"MyTC\"
;   build_flags = -D SKIP_LTC_TIMER   ; debug: disable LTC timer to isolate WiFi issue
