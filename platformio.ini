[platformio]
default_envs = slave

; ─── Slave: ESP32-C3 Super Mini, BLE client ──────────────────────────────────
[env:slave]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.partitions = no_ota.csv
build_flags =
    -Os
    -include src/config_slave.h
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1
src_filter = +<*> -<ble_timecode_stub.cpp>
lib_deps =
    Wire
    u8g2
    md_max72xx

; ─── Clap: ESP32-C3 Super Mini, BLE slave + LED matrix only ──────────────────
[env:clap]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.partitions = no_ota.csv
build_flags =
    -Os
    -include src/config_clap.h
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1
src_filter = +<*> -<ble_timecode_stub.cpp>
lib_deps =
    Wire
    md_max72xx

; ─── Master: Waveshare ESP32-P4-WIFI6, HDMI receiver + BLE server ────────────
[env:master]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-p4
framework = arduino
monitor_speed = 115200
build_flags =
    -Os
    -include src/config_master.h
    -DCORE_DEBUG_LEVEL=1
src_filter = +<*> -<ble_timecode.cpp> +<ble_timecode_stub.cpp>
lib_deps =
    Wire
    u8g2
    md_max72xx
