[platformio]
default_envs = TC-WL-LTC

; ─── TC-WL-LTC: Seeed Studio XIAO ESP32-C3, dual-role master/slave ──────────
[env:TC-WL-LTC]
extra_scripts = extra_scripts/build_android.py
platform = https://github.com/pioarduino/platform-espressif32.git
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.partitions = ota_nofs_4MB.csv
build_flags =
    -Os
    -include src/config_tcwl_ltc.h
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1
build_src_filter = +<*> -<timecode/ble_timecode_stub.cpp> -<matrix/>
lib_deps =
    Wire
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11

; ─── TC-WL-CLAP: ESP32-C3 Super Mini, BLE client + LED matrix only ──────────
[env:TC-WL-CLAP]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.partitions = ota_nofs_4MB.csv
build_flags =
    -Os
    -include src/config_tcwl_clap.h
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1
build_src_filter = +<*> -<timecode/ble_timecode_stub.cpp>
lib_deps =
    Wire
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    md_max72xx

; ─── TC-WL-HDMI: Waveshare ESP32-P4-WIFI6, HDMI receiver + BLE server ────────
[env:TC-WL-HDMI]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-p4
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 360000000L
build_flags =
    -Os
    -include src/config_tcwl_hdmi.h
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ESP_HOSTED_NIMBLE_HCI_VHCI=1
build_src_filter = +<*> -<timecode/ble_timecode_stub.cpp>
lib_deps =
    Wire
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    md_max72xx
    adafruit/Adafruit GFX Library @ ^1.11.11
