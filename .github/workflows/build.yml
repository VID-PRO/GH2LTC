name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build all environments
        run: |
          pio run -e TC-WL-LTC
          pio run -e TC-WL-CLAP
          pio run -e TC-WL-HDMI

      - name: Merge firmware binaries
        run: python scripts/merge_bins.py

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tc-wl-firmware
          path: merged/
          compression-level: 0

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" $(find merged -name '*.bin') --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
