name: Build firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (all envs)
        run: pio run -e master -e slave -e clap

      - name: Upload firmware binaries to release
        if: github.event_name == 'release'
        run: |
          mkdir -p upload

          for env in master slave clap; do
            cp ".pio/build/$env/firmware.bin"    "upload/${env}_firmware.bin"
            cp ".pio/build/$env/bootloader.bin"  "upload/${env}_bootloader.bin"
            cp ".pio/build/$env/partitions.bin"  "upload/${env}_partitions.bin"
          done

          gh release upload "${{ github.ref_name }}" upload/* --clobber
          gh release view "${{ github.ref_name }}" --json body --jq .body > existing-notes.md
          {
            printf '\n---\n\n## Flashing\n\n'
            printf '### Master (ESP32-P4-WIFI6)\n```\nesptool.py --chip esp32p4 --port /dev/ttyUSB0 write_flash \\\n  0x0 .pio/build/master/bootloader.bin \\\n  0x8000 .pio/build/master/partitions.bin \\\n  0x10000 .pio/build/master/firmware.bin\n```\n\n'
            printf '### Slave (ESP32-C3)\n```\nesptool.py --chip esp32c3 --port /dev/ttyUSB0 write_flash \\\n  0x0 .pio/build/slave/bootloader.bin \\\n  0x8000 .pio/build/slave/partitions.bin \\\n  0x10000 .pio/build/slave/firmware.bin\n```\n\n'
            printf '### Clap (ESP32-C3, LED matrix only)\n```\nesptool.py --chip esp32c3 --port /dev/ttyUSB0 write_flash \\\n  0x0 .pio/build/clap/bootloader.bin \\\n  0x8000 .pio/build/clap/partitions.bin \\\n  0x10000 .pio/build/clap/firmware.bin\n```\n\n'
            printf 'Replace `/dev/ttyUSB0` with your port (`COM3` on Windows, `/dev/cu.usbmodem*` on macOS).\n'
          } >> existing-notes.md
          gh release edit "${{ github.ref_name }}" --notes-file existing-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifacts (all envs)
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/master/firmware.bin
            .pio/build/master/bootloader.bin
            .pio/build/master/partitions.bin
            .pio/build/slave/firmware.bin
            .pio/build/slave/bootloader.bin
            .pio/build/slave/partitions.bin
            .pio/build/clap/firmware.bin
            .pio/build/clap/bootloader.bin
            .pio/build/clap/partitions.bin
