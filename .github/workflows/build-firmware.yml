name: Build firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build master
        run: pio run -e master

      - name: Build slave
        run: pio run -e slave

      - name: Upload firmware binaries to release
        if: github.event_name == 'release'
        run: |
          mkdir -p upload
          cp .pio/build/master/firmware.bin    upload/master-firmware.bin
          cp .pio/build/master/bootloader.bin  upload/master-bootloader.bin
          cp .pio/build/master/partitions.bin  upload/master-partitions.bin
          cp .pio/build/slave/firmware.bin     upload/slave-firmware.bin
          cp .pio/build/slave/bootloader.bin   upload/slave-bootloader.bin
          cp .pio/build/slave/partitions.bin   upload/slave-partitions.bin
          gh release upload "${{ github.ref_name }}" upload/* --clobber
          gh release view "${{ github.ref_name }}" --json body --jq .body > existing-notes.md
          printf '\n---\n\n## Flashing\n\n### Master (HDMI + LTC + BLE server)\n```\nesptool.py --chip esp32c3 --port /dev/ttyUSB0 write_flash \\\n  0x0 master-bootloader.bin \\\n  0x8000 master-partitions.bin \\\n  0x10000 master-firmware.bin\n```\n\n### Slave (BLE client, no HDMI)\n```\nesptool.py --chip esp32c3 --port /dev/ttyUSB0 write_flash \\\n  0x0 slave-bootloader.bin \\\n  0x8000 slave-partitions.bin \\\n  0x10000 slave-firmware.bin\n```\n\nReplace `/dev/ttyUSB0` with your port (`COM3` on Windows, `/dev/cu.usbmodem*` on macOS).\n' >> existing-notes.md
          gh release edit "${{ github.ref_name }}" --notes-file existing-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload firmware as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/master/firmware.bin
            .pio/build/master/bootloader.bin
            .pio/build/master/partitions.bin
            .pio/build/slave/firmware.bin
            .pio/build/slave/bootloader.bin
            .pio/build/slave/partitions.bin
