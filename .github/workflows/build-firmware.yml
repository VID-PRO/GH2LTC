name: Build firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build master
        run: pio run -e master

      - name: Build slave
        run: pio run -e slave

      - name: Upload firmware to release
        run: |
          mkdir -p upload
          cp .pio/build/master/firmware.bin    upload/master-firmware.bin
          cp .pio/build/master/bootloader.bin  upload/master-bootloader.bin
          cp .pio/build/master/partitions.bin  upload/master-partitions.bin
          cp .pio/build/slave/firmware.bin     upload/slave-firmware.bin
          cp .pio/build/slave/bootloader.bin   upload/slave-bootloader.bin
          cp .pio/build/slave/partitions.bin   upload/slave-partitions.bin
          gh release upload "${{ github.ref_name }}" upload/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
