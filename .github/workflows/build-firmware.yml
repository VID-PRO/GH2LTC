name: Build firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Upload firmware binaries to release
        if: github.event_name == 'release'
        run: |
          mkdir -p upload
          cp .pio/build/dual/firmware.bin    upload/firmware.bin
          cp .pio/build/dual/bootloader.bin  upload/bootloader.bin
          cp .pio/build/dual/partitions.bin  upload/partitions.bin
          gh release upload "${{ github.ref_name }}" upload/* --clobber
          gh release view "${{ github.ref_name }}" --json body --jq .body > existing-notes.md
          printf '\n---\n\n## Flashing\n\n```\nesptool.py --chip esp32c3 --port /dev/ttyUSB0 write_flash \\\n  0x0 bootloader.bin \\\n  0x8000 partitions.bin \\\n  0x10000 firmware.bin\n```\n\nReplace `/dev/ttyUSB0` with your port (`COM3` on Windows, `/dev/cu.usbmodem*` on macOS).\n\nTo switch between Master and Slave mode at runtime, connect to the web UI and change the Device Mode in Settings.\n' >> existing-notes.md
          gh release edit "${{ github.ref_name }}" --notes-file existing-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload firmware as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/dual/firmware.bin
            .pio/build/dual/bootloader.bin
            .pio/build/dual/partitions.bin
